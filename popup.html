<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  :root{--indigo:#4f46e5;--ink:#1f2733;--line:#e5e9f2;--bg:#f5f7fb;--green:#16a34a;--amber:#d97706;--red:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:450px;max-height:600px;overflow-y:auto;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
  header{background:linear-gradient(135deg,#312e81,#4f46e5);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:5}
  header h1{font-size:15px;font-weight:700}header p{font-size:11px;opacity:.85;margin-top:3px}
  .drbar{display:flex;align-items:center;justify-content:space-between;margin:10px 12px 0;padding:10px 16px;border-radius:12px;background:#eef1fb;border:1px solid #e5e9f2}
  .drt{font-size:13.5px;font-weight:700;color:#312e81}.drt em{font-style:normal;font-weight:500;color:#8890a3;font-size:11px}
  .drn{font-size:28px;font-weight:800;color:#8890a3;line-height:1}
  .drn.g{color:#16a34a}.drn.a{color:#d97706}.drn.r{color:#dc2626}
  .ctrl{padding:12px 12px 4px;display:flex;gap:8px}
  .ctrl input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px}
  .ctrl button{background:var(--indigo);color:#fff;border:0;padding:9px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:12.5px;white-space:nowrap}
  .ctrl button:disabled{opacity:.6;cursor:default}
  .opts{padding:2px 12px 6px;font-size:11px;color:#5a6478;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .opts label{display:flex;align-items:center;gap:5px;cursor:pointer}
  .opts input[type=number]{width:52px;border:1px solid var(--line);border-radius:6px;padding:3px 6px}
  .opts input[type=text]{border:1px solid var(--line);border-radius:6px;padding:3px 6px;width:120px}
  .prog{font-size:11.5px;color:#5a6478;text-align:center;margin:4px 12px 8px;white-space:pre-wrap}
  .summary{display:none;gap:8px;padding:0 12px 8px;flex-wrap:wrap}
  .chip{background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;flex:1;min-width:70px;text-align:center}
  .chip .n{font-size:19px;font-weight:800}.chip.r .n{color:var(--red)}.chip.a .n{color:var(--amber)}.chip.g .n{color:var(--green)}
  .chip .l{font-size:9px;text-transform:uppercase;color:#8890a3;letter-spacing:.3px}
  .scoreband{display:none;align-items:center;gap:12px;margin:0 12px 8px;padding:10px 14px;background:#fff;border:1px solid var(--line);border-radius:10px}
  .scoreband .s{font-size:28px;font-weight:800}.scoreband .s.g{color:var(--green)}.scoreband .s.a{color:var(--amber)}.scoreband .s.r{color:var(--red)}
  .scoreband .l{font-size:11px;color:#8890a3;text-transform:uppercase}
  .btns{display:flex;gap:8px;padding:6px 12px 0}
  .btns button{flex:1;background:#fff;border:1px solid var(--indigo);color:var(--indigo);padding:8px;border-radius:9px;font-weight:700;cursor:pointer;font-size:12px;display:none}
  #results{padding:0 12px 14px}
  .sec{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8890a3;margin:14px 0 5px;font-weight:700}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-bottom:5px}
  .row .mini{font-family:'SF Mono',Monaco,monospace;font-size:10.5px;color:var(--indigo);word-break:break-all}
  .row .mini a.lnk{color:var(--indigo);text-decoration:none;border-bottom:1px dotted #b6bce8}
  .row .mini a.lnk:hover{color:#312e81;border-bottom-color:#312e81}
  .badge{flex:0 0 auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .badge.g{background:#e7f7ee;color:var(--green)}.badge.a{background:#fdf3e6;color:var(--amber)}.badge.r{background:#fdeaea;color:var(--red)}
  .note{font-size:10.5px;color:#9aa3b5;padding:2px 12px 12px;line-height:1.5}
</style>
</head>
<body>
<header><h1>Audit SEO site</h1><p>crawl du sitemap - 404, H1, canonicals, techno, schema</p></header>
<div class="drbar" id="drbar">
  <span class="drt">Domain Rating <em>par Ahrefs</em></span>
  <span class="drn" id="drVal">--</span>
</div>
<div class="ctrl">
  <input id="domain" type="text" placeholder="https://exemple.fr" />
  <button id="scanBtn">Scanner</button>
</div>
<div class="opts">
  <label title="Scanne toutes les pages du sitemap, sans limite"><input type="checkbox" id="scanAll" /> <b>Tout le site</b></label>
  <label>Pages <input id="maxPages" type="number" value="50" min="5" max="5000" /></label>
  <label>Marque <input id="brand" type="text" placeholder="Linkuma" /></label>
</div>
<div class="prog" id="prog"></div>
<div class="scoreband" id="scoreband"></div>
<div class="summary" id="summary"></div>
<div class="btns">
  <button id="pdfBtn">📄 Rapport PDF</button>
  <button id="csvBtn">⬇ CSV</button>
  <button id="copyBtn">Copier texte</button>
</div>
<div id="results"></div>
<div class="note" id="note"></div>
<script src="popup.js"></script>
</body>
</html>
